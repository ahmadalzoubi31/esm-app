events {
  worker_connections 1024;
}

http {
  # Rate limiting zone
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

  # Upstreams
  upstream web {
    server web:3000;
  }

  upstream api {
    server api:5000;
  }

  # ---- Redirect HTTP → HTTPS ----
  server {
    listen 80;
    server_name webpexo.com www.webpexo.com api.webpexo.com;
    return 301 https://$host$request_uri;
  }

  # ---- webpexo.com (TanStack Start SSR) ----
  server {
    listen 443 ssl;
    server_name webpexo.com www.webpexo.com;

    ssl_certificate     /etc/nginx/certs/live/webpexo.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/webpexo.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection      "1; mode=block" always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    location / {
      proxy_pass         http://web;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 60s;
    }
  }

  # ---- api.webpexo.com (NestJS) ----
  server {
    listen 443 ssl;
    server_name api.webpexo.com;

    ssl_certificate     /etc/nginx/certs/live/api.webpexo.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/api.webpexo.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # CORS (adjust origin to match your frontend)
    add_header Access-Control-Allow-Origin  "https://webpexo.com" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

    # Handle preflight
    location / {
      if ($request_method = OPTIONS) {
        return 204;
      }

      limit_req  zone=api_limit burst=50 nodelay;

      proxy_pass         http://api;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }
  }
}